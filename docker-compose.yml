version: "3.8"
services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./attendance.db
      - SECRET_KEY=change-me
      - ADMIN_USER=admin
      - ADMIN_PASSWORD=admin
      - FACE_DISTANCE_THRESHOLD=0.5
      - FRONTEND_ORIGIN=http://localhost:3000
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    working_dir: /app
    # install dependencies and run Vite listening on all interfaces so host can reach it
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      - CHOKIDAR_USEPOLLING=true
